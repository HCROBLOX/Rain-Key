<!-- index.html -->

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rain Key System</title>

<script src="https://js.hcaptcha.com/1/api.js" async defer></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
font-family:sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:360px;
background:rgba(25,25,25,0.95);
border:1px solid rgba(255,255,255,0.08);
border-radius:22px;
padding:30px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.logo{
width:85px;
height:85px;
border-radius:20px;
margin-bottom:15px;
object-fit:cover;
}

.title{
font-size:30px;
font-weight:bold;
margin-bottom:8px;
}

.desc{
color:#bdbdbd;
font-size:14px;
margin-bottom:22px;
}

.button{
width:100%;
padding:13px;
border:none;
border-radius:14px;
background:#5865F2;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

.button:disabled{
opacity:0.5;
cursor:not-allowed;
}

.footer{
margin-top:18px;
color:gray;
font-size:12px;
}

</style>

</head>
<body>

<div class="container">

<img class="logo"
src="logo.png">

<div class="title">
Rain Key System
</div>

<div class="desc">
Complete hCaptcha to continue
</div>

<div class="h-captcha"
data-sitekey="f7cc59f8-9816-4a7e-a224-00a638f60868"
data-callback="verified">
</div>

<button class="button"
id="continueBtn"
disabled>
Continue
</button>

<div class="footer">
Protected by hCaptcha
</div>

</div>

<script>

let verifiedUser = false;

function verified(){

verifiedUser = true;

document.getElementById("continueBtn")
.disabled = false;

}

function randomString(length=32){

const chars =
"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

let result = "";

for(let i=0;i<length;i++){

result += chars.charAt(
Math.floor(Math.random()*chars.length)
);

}

return result;

}

document.getElementById("continueBtn")
.addEventListener("click",function(){

if(!verifiedUser) return;

// random token
const token =
randomString();

// random branch
const branch =
Math.floor(Math.random()*3)+1;

// save token
sessionStorage.setItem(
"rain_token",
token
);

// save allowed branch
sessionStorage.setItem(
"rain_branch",
branch
);

// save redirect
sessionStorage.setItem(
"rain_redirect",
"https://hcroblox.github.io/Rain-Key/key.html?branch=" +
branch +
"&token=" +
token
);

// go linkvertise
window.location.href =
"https://link-target.net/6077399/XB4z3OuLhO0R";

});

</script>

</body>
  </html>

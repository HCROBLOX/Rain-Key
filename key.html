<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Key</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:360px;
background:rgba(25,25,25,0.95);
border-radius:20px;
padding:30px;
text-align:center;
backdrop-filter: blur(10px);
}

.logo{
width:80px;height:80px;border-radius:15px;margin-bottom:10px;
}

.title{font-size:28px;font-weight:bold;}
.desc{color:#aaa;font-size:14px;margin:10px 0 20px;}

.keybox{
background:#111;
padding:15px;
border-radius:12px;
font-size:16px;
word-break:break-all;
margin-bottom:15px;
min-height:50px;
display:flex;
align-items:center;
justify-content:center;
}

.button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#5865F2;
color:white;
font-size:15px;
cursor:pointer;
}

.footer{margin-top:15px;font-size:12px;color:gray;}
</style>
</head>

<body>

<div class="container">
<img class="logo" src="logo.png" onerror="this.style.display='none'">

<div class="title">Your Key</div>
<div class="desc">Verified System</div>

<div class="keybox" id="keyBox">Generating...</div>

<button class="button" onclick="copyKey()">Copy Key</button>

<div class="footer">Rain Key System</div>
</div>

<script>
// =====================
// GENERATE KEY
// =====================
function generateKey(len = 45){
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
let out = "";
for(let i = 0; i < len; i++){
out += chars[Math.floor(Math.random() * chars.length)];
}
return out;
}

// =====================
// CREATE & SAVE KEY
// =====================
const storageKey = "rain_key_global";

let key = localStorage.getItem(storageKey);

if(!key){
key = generateKey();
localStorage.setItem(storageKey, key);
}

// show key
document.getElementById("keyBox").innerText = key;

// =====================
// COPY KEY
// =====================
function copyKey(){
navigator.clipboard.writeText(key)
.then(() => alert("Copied Key!"))
.catch(() => alert("Copy failed!"));
}

// disable right click
document.addEventListener("contextmenu", e => e.preventDefault());
</script>

</body>
</html>

<!-- key.html -->

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rain Key System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
font-family:sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:360px;
background:rgba(25,25,25,0.95);
border:1px solid rgba(255,255,255,0.08);
border-radius:22px;
padding:30px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.logo{
width:85px;
height:85px;
border-radius:20px;
margin-bottom:15px;
object-fit:cover;
}

.title{
font-size:30px;
font-weight:bold;
margin-bottom:8px;
}

.desc{
color:#bdbdbd;
font-size:14px;
margin-bottom:25px;
}

.keybox{
background:#111;
border:1px solid rgba(255,255,255,0.08);
border-radius:14px;
padding:18px;
font-size:18px;
font-weight:bold;
letter-spacing:1px;
margin-bottom:20px;
word-break:break-all;
}

.button{
width:100%;
padding:13px;
border:none;
border-radius:14px;
background:#5865F2;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.footer{
margin-top:18px;
color:gray;
font-size:12px;
}

</style>

</head>
<body>

<div class="container">

<img class="logo"
src="logo.png">

<div class="title">
Your Key
</div>

<div class="desc">
Successfully Passed Verification
</div>

<div class="keybox"
id="keyBox">
Loading...
</div>

<button class="button"
onclick="copyKey()">
Copy Key
</button>

<div class="footer">
Rain Key System
</div>

</div>

<script>

// params
const params =
new URLSearchParams(
window.location.search
);

// token
const token =
params.get("token");

// branch
const branch =
params.get("branch");

// saved data
const savedToken =
localStorage.getItem(
"rain_token"
);

const savedBranch =
localStorage.getItem(
"rain_branch"
);

// anti bypass
if(
!token ||
!branch ||
token !== savedToken ||
branch !== savedBranch
){

document.body.innerHTML =
"<h1 style='color:white;font-family:sans-serif;text-align:center;'>Access Denied</h1>";

throw new Error(
"Bypass detected"
);

}

// generate random key
function generateKey(
length=40
){

const chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

let result = "";

for(
let i=0;
i<length;
i++
){

result += chars.charAt(
Math.floor(
Math.random()*chars.length
)
);

}

return result;

}

// unique branch key
const storageKey =
"rain_branch_" + branch;

// get old key
let savedKey =
localStorage.getItem(
storageKey
);

// create new key
if(!savedKey){

savedKey =
generateKey();

localStorage.setItem(
storageKey,
savedKey
);

}

// show key
document.getElementById(
"keyBox"
).innerText = savedKey;

// copy
function copyKey(){

navigator.clipboard.writeText(
savedKey
);

alert("Copied Key!");

}

// anti spam reload
window.onbeforeunload =
function(){

localStorage.setItem(
"rain_last_access",
Date.now()
);

};

// anti inspect
document.addEventListener(
"contextmenu",
event => event.preventDefault()
);

// anti f12
document.onkeydown =
function(e){

if(
e.keyCode == 123 ||
(
e.ctrlKey &&
e.shiftKey &&
e.keyCode == 73
)
){

return false;

}

};

</script>

</body>
</html>
